site_name: Psoriasis Robust Adv&Defense
site_description: 银屑病医学影像诊断的对抗攻防协同鲁棒性增强方法研究
site_author: HUST Researchers
site_url: https://NAC-HUST.github.io/Psoriasis-Robust-Adv-Defense

repo_name: NAC-HUST/Psoriasis-Robust-Adv-Defense
repo_url: https://github.com/NAC-HUST/Psoriasis-Robust-Adv-Defense
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: red
      toggle:
        icon: material/brightness-7
        name: 浅色模式
    
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: red
      toggle:
        icon: material/brightness-4
        name: 深色模式

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - toc.integrate
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

plugins:
  - search:
      lang: zh
  - awesome-pages
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      fallback_to_build_date: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_emphasis: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:materialx.emoji.to_svg
      emoji_index: !!python/name:materialx.emoji.twemoji
  - pymdownx.highlight:
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 👋 入门:
    - 项目概览: getting-started/overview.md
    - 安装指南: getting-started/installation.md
    - 快速开始: getting-started/quickstart.md
  
  - 📚 文档:
    - 项目结构: documentation/structure.md
    - 数据预处理: documentation/preprocessing.md
    - 模型训练: documentation/training.md
    - 对抗攻击: documentation/attack.md
    - CLI 参考: documentation/cli-reference.md
  
  - 🔬 研究:
    - 技术方案: research/methodology.md
    - 算法详解: research/algorithm.md
    - 实验结果: research/results.md
  
  - 🤝 贡献:
    - 贡献指南: contributing/guide.md
    - 代码规范: contributing/code-style.md
    - 开发流程: contributing/workflow.md
  
  - 📄 许可证: license.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NAC-HUST/Psoriasis-Robust-Adv-Defense
    - icon: fontawesome/solid/university
      link: https://www.hust.edu.cn/

  footer:
    copyright: Copyright &copy; 2024-2025 Psoriasis Robust Adv&Defense Project. Licensed under GPLv3.

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/katex.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js
